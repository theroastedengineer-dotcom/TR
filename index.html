
<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Roasted Engineer | Engineered Gourmet Gifting</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React & ReactDOM -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Load Babel for compiling React in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Load Google Fonts -->

<body>
    <div id="root"></div>

    <!-- MAIN APP CODE -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
          // Theme Colors
          const colors = {
            navy: '#0B2545',
            copper: '#B87333',
            gold: '#C8A042',
            cream: '#F5F1E8',
            charcoal: '#1A1A1A'
          };

          const [isModalOpen, setIsModalOpen] = useState(false);
          const [checkoutData, setCheckoutData] = useState(null);
          const [cart, setCart] = useState({});
          const [boxUpgrade, setBoxUpgrade] = useState('Medium Box');

          // Customization State
          const [customCompanyName, setCustomCompanyName] = useState('');
          const [customBoxTheme, setCustomBoxTheme] = useState('Navy/Copper');
          const [customLogoInfo, setCustomLogoInfo] = useState(null);
          const [orderQuantity, setOrderQuantity] = useState(1);
          const [logoError, setLogoError] = useState(false);

          // Image State
          const [generatedImages, setGeneratedImages] = useState({ h1: null, h2: null, h3: null });
          const [imagesLoading, setImagesLoading] = useState({ h1: true, h2: true, h3: true });

          // Render Icons on UI update
          useEffect(() => {
              if (window.lucide) {
                  window.lucide.createIcons();
              }
          });

          // Data
          const signatureHampers = [
            { 
              id: 'h1', sku: 'TRE-PRC-01', name: 'The Precision Pack', price: 558, 
              desc: 'Small in size, precise in impact.',
              img: 'https://images.unsplash.com/photo-1607344645866-bea1b498f3cc?q=80&w=800&auto=format&fit=crop',
              features: ['2 flavoured dry fruits (80g each)', '1 premium sweet (~150g)', '6 handmade chocolates', '1 festive keepsake — Small brass diya'],
              ideal: 'employee gifting'
            },
            { 
              id: 'h2', sku: 'TRE-FSN-02', name: 'The Fusion Crate', price: 949, 
              desc: 'Flavour, wellness & celebration—perfectly fused.',
              img: 'https://images.unsplash.com/photo-1542841791-efa146bf7743?q=80&w=800&auto=format&fit=crop',
              features: ['3 flavoured dry fruits (80g each)', '1 premium sweet (~250g)', '12 handmade chocolates', '1 healthy snack (80g)', '1 keepsake — Jar candle'],
              ideal: 'teams & valued clients',
              badge: 'Best-Selling Configuration'
            },
            { 
              id: 'h3', sku: 'TRE-LUX-03', name: 'The Luxe Curation', price: 1399, 
              desc: 'A grand assembly of engineered indulgence.',
              img: 'https://images.unsplash.com/photo-1512952554476-80db2df1ec7a?q=80&w=800&auto=format&fit=crop',
              features: ['4 flavoured dry fruits (80g each)', '1 premium sweet (~400g)', '15 handmade chocolates', '2 healthy snacks', '1 keepsake — Luxe signature lotus diya'],
              ideal: 'leadership & VIPs'
            }
          ];

          const addOnModules = {
            dryFruits: { title: 'A) Dry Fruits', subtitle: '80g Jar', items: [{ id: 'df1', name: 'Flavoured Almonds', price: 120 }, { id: 'df2', name: 'Flavoured Cashews', price: 130 }] },
            sweets: { title: 'B) Premium Sweets', subtitle: '150-200g Box', items: [{ id: 'sw1', name: 'Stuffed Medjool Dates', price: 160 }, { id: 'sw2', name: 'Rose Petal Gulkand Bites', price: 150 }, { id: 'sw3', name: 'Seed & Nut Ladoo', price: 150 }, { id: 'sw4', name: 'Dry Fruit Paan Cubes', price: 150 }, { id: 'sw5', name: 'Anjeer Walnut Barfi', price: 200 }] },
            chocolates: { title: 'C) Handmade Chocolates', subtitle: 'In Potli (per pc)', items: [{ id: 'ch1', name: 'Almond Rocks', price: 15 }, { id: 'ch2', name: 'Pralines', price: 15 }, { id: 'ch3', name: 'Coffee', price: 15 }, { id: 'ch4', name: 'Fruit & Nut', price: 15 }, { id: 'ch5', name: 'Butterscotch Crunch', price: 12 }] },
            snacks: { title: 'D) Healthy Snacks', subtitle: '80g Jar', items: [{ id: 'sn1', name: 'Peri-Peri Makhana', price: 100 }, { id: 'sn2', name: 'Roasted Chana', price: 80 }, { id: 'sn3', name: 'Masala Oats / Ragi Puffs', price: 80 }, { id: 'sn4', name: 'Multigrain Sticks', price: 90 }, { id: 'sn5', name: 'Spiced Corn Flakes', price: 90 }] },
            keepsakes: { title: 'E) Diwali Keepsakes', subtitle: 'Transparent Box', items: [{ id: 'ks1', name: 'Mini Brass Diya', price: 60 }, { id: 'ks2', name: 'Lotus Diya', price: 100 }, { id: 'ks3', name: 'Jar Candle', price: 120 }, { id: 'ks4', name: 'Brass Akhand Jyot', price: 220 }] }
          };

          const boxOptions = [
            { name: 'Medium Box', price: 40 },
            { name: 'Large Box', price: 75 },
            { name: 'Magnetic Luxury Box', price: 150 }
          ];

          const getAvailableBoxOptions = (total) => {
            if (total === 0 || total <= 4) return boxOptions; 
            if (total <= 7) return boxOptions.filter(b => b.name !== 'Medium Box'); 
            return boxOptions.filter(b => b.name === 'Magnetic Luxury Box'); 
          };

          // Logic
          useEffect(() => {
            const apiKey = ""; // API calls disabled for static standalone host
            
            const generateHamperImage = async (id, itemsDesc) => {
                try {
                    // Simulating AI loading time, then falling back to high-end Unsplash product images
                    // This ensures the site works perfectly when hosted publicly on Netlify
                    await new Promise(r => setTimeout(r, 1500));
                    throw new Error("Using static asset fallback for public hosting.");
                } catch (error) {
                    const hamperData = signatureHampers.find(h => h.id === id);
                    setGeneratedImages(prev => ({ ...prev, [id]: hamperData.img }));
                } finally {
                    setImagesLoading(prev => ({ ...prev, [id]: false }));
                }
            };

            generateHamperImage('h1', '');
            generateHamperImage('h2', '');
            generateHamperImage('h3', '');
          }, []);

          useEffect(() => {
            const itemsArray = Object.values(cart);
            const totalItems = itemsArray.reduce((sum, item) => sum + item.qty, 0);
            const availableBoxes = getAvailableBoxOptions(totalItems);

            if (!availableBoxes.find(b => b.name === boxUpgrade)) {
              if (availableBoxes.length > 0) {
                setBoxUpgrade(availableBoxes[0].name);
              }
            }
          }, [cart, boxUpgrade]);

          const handleUpdateCart = (item, delta) => {
            setCart(prev => {
              const newCart = { ...prev };
              const currentQty = newCart[item.id]?.qty || 0;
              const newQty = currentQty + delta;
              
              if (newQty <= 0) {
                delete newCart[item.id];
              } else {
                newCart[item.id] = { ...item, qty: newQty };
              }
              return newCart;
            });
          };

          const getCustomTotals = () => {
            const itemsArray = Object.values(cart);
            const totalItems = itemsArray.reduce((sum, item) => sum + item.qty, 0);
            const itemsCost = itemsArray.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            let packingCharge = 0;
            if (totalItems === 0) packingCharge = 0;
            else if (totalItems === 1) packingCharge = 20;
            else if (totalItems === 2) packingCharge = 35;
            else if (totalItems === 3) packingCharge = 50;
            else if (totalItems >= 4) packingCharge = 75;

            const availableBoxes = getAvailableBoxOptions(totalItems);
            const validBoxName = availableBoxes.find(b => b.name === boxUpgrade) ? boxUpgrade : (availableBoxes[0]?.name || 'Medium Box');
            const selectedBox = boxOptions.find(b => b.name === validBoxName);
            const boxCost = selectedBox ? selectedBox.price : 0;

            return { totalItems, itemsCost, packingCharge, boxCost, grandTotal: itemsCost + packingCharge + boxCost, validBoxName };
          };

          const handleBuySignature = (hamper) => {
            setCheckoutData({ type: 'signature', item: hamper });
            setCustomCompanyName('');
            setCustomBoxTheme('Navy/Copper');
            setCustomLogoInfo(null);
            setOrderQuantity(1);
            setIsModalOpen(true);
          };

          const handleBuyCustom = () => {
            setCheckoutData({ type: 'custom', details: getCustomTotals(), items: Object.values(cart) });
            setCustomCompanyName('');
            setCustomBoxTheme('Navy/Copper');
            setCustomLogoInfo(null);
            setOrderQuantity(1);
            setIsModalOpen(true);
          };

          const sendWhatsAppOrder = () => {
            const phone = "918141040146";
            let text = "Hello The Roasted Engineer, I would like to place an order:\n\n";
            text += `*Order Quantity:* ${orderQuantity} hampers\n\n`;

            let unitPrice = 0;

            if (checkoutData.type === 'signature') {
              unitPrice = checkoutData.item.price;
              text += `*Type:* Signature Hamper\n*SKU:* ${checkoutData.item.sku}\n*Item:* ${checkoutData.item.name}\n*Unit Price:* ₹${unitPrice}\n`;
            } else {
              unitPrice = checkoutData.details.grandTotal;
              text += `*Type:* Custom Engineered Hamper\n*Items:*\n`;
              checkoutData.items.forEach(i => {
                text += `- ${i.qty}x ${i.name} (₹${i.price * i.qty})\n`;
              });
              text += `\n*Box Configuration:* ${checkoutData.details.validBoxName} (+₹${checkoutData.details.boxCost})`;
              text += `\n*Assembly/Packing:* ₹${checkoutData.details.packingCharge}`;
              text += `\n*Unit Total:* ₹${unitPrice}\n`;
            }

            text += `\n*--- GRAND TOTAL ---*\n*₹${unitPrice * orderQuantity}*\n`;

            if (orderQuantity >= 50) {
              text += `\n*--- Branding & Box Customization ---*\n`;
              text += `*Company Name:* ${customCompanyName || 'Not provided'}\n`;
              text += `*Box Color Theme:* ${customBoxTheme}\n`;
              if (customLogoInfo) {
                text += `*Logo Uploaded:* Yes (${customLogoInfo.name})\n_(Note: I will attach the logo image directly in this chat.)_\n`;
              } else {
                text += `*Logo Uploaded:* No\n`;
              }
            }

            text += "\n\nPlease let me know the next steps for payment and delivery details.";
            const encodedText = encodeURIComponent(text);
            window.open(`https://wa.me/${phone}?text=${encodedText}`, '_blank');
            setIsModalOpen(false);
          };

          const Divider = () => <div className="h-1 w-16 mt-3 mb-6 relative"><div className="absolute inset-0" style={{ backgroundColor: colors.copper }}></div><div className="absolute -left-2 -top-1 font-mono text-[8px]" style={{color: colors.copper}}>//</div></div>;

          const currentTotalItems = Object.values(cart).reduce((sum, item) => sum + item.qty, 0);
          const availableBoxOptions = getAvailableBoxOptions(currentTotalItems);

          return (
            <div className="min-h-screen pb-20 relative font-sans text-[#1A1A1A] bg-[#F5F1E8]">
              
              {/* INTERNAL CSS */}
              <style dangerouslySetInnerHTML={{__html: `
                .font-mono-tech { font-family: 'JetBrains Mono', monospace; }
                .blueprint-bg {
                  background-color: #F5F1E8;
                  background-image: linear-gradient(rgba(184, 115, 51, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(184, 115, 51, 0.08) 1px, transparent 1px);
                  background-size: 30px 30px;
                }
                .blueprint-navy-bg {
                  background-color: #0B2545;
                  background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
                  background-size: 30px 30px;
                }
                .drafting-marks { position: relative; }
                .drafting-marks::before, .drafting-marks::after {
                  content: '+'; position: absolute; color: #B87333; font-family: monospace; font-size: 14px; line-height: 1; opacity: 0.7;
                }
                .drafting-marks::before { top: -6px; left: -4px; }
                .drafting-marks::after { bottom: -6px; right: -4px; }
                .scanner-line {
                  width: 100%; height: 1px; background: rgba(184,115,51,0.5); position: absolute; top: 0; left: 0;
                  animation: scan 4s linear infinite; z-index: 20; opacity: 0.5; pointer-events: none;
                }
                @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
                @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
                .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
              `}} />

              {/* NAVBAR */}
              <nav className="sticky top-0 z-40 shadow-md py-3 px-6 md:px-12 flex justify-between items-center bg-[#0B2545] border-b border-[#B87333]/30">
                <a href="#" className="flex items-center">
                  {!logoError ? (
                    <img src="./Designer (3).jpg" alt="Logo" className="h-14 md:h-16 w-auto object-contain mix-blend-screen" onError={() => setLogoError(true)} />
                  ) : (
                    <div className="flex flex-col justify-center">
                      <div className="text-xl md:text-2xl font-bold tracking-widest text-[#C8A042]" style={{ fontFamily: "'Playfair Display', serif" }}>THE ROASTED ENGINEER</div>
                      <div className="text-[0.6rem] tracking-[0.2em] text-white/70 uppercase mt-1 font-mono-tech">[ SYS.RDY ] Where Gifting Meets Engineering</div>
                    </div>
                  )}
                </a>
                <div className="hidden md:flex space-x-8 text-sm font-medium text-white/90 uppercase tracking-wider font-mono-tech text-xs">
                  <a href="#about" className="hover:text-[#C8A042] transition-colors flex items-center"><span className="text-[#B87333] mr-1">01.</span> About</a>
                  <a href="#hampers" className="hover:text-[#C8A042] transition-colors flex items-center"><span className="text-[#B87333] mr-1">02.</span> Assemblies</a>
                  <a href="#addons" className="hover:text-[#C8A042] transition-colors flex items-center"><span className="text-[#B87333] mr-1">03.</span> Configurator</a>
                </div>
              </nav>

              {/* HERO PAGE */}
              <section className="relative pt-20 pb-32 px-6 md:px-12 lg:px-24 overflow-hidden flex flex-col md:flex-row items-center justify-between blueprint-bg">
                <div className="md:w-1/2 z-10 mb-12 md:mb-0 relative">
                  <div className="absolute -left-8 top-0 text-[#B87333]/30 font-mono-tech text-xs rotate-[-90deg] origin-left">Y-AXIS 0.00</div>
                  <p className="font-mono-tech text-xs mb-4 uppercase flex items-center tracking-widest" style={{ color: colors.copper }}>
                    <i data-lucide="cpu" className="w-4 h-4 mr-2"></i> [ SPEC: CORPORATE • FESTIVE • CUSTOM ]
                  </p>
                  <h1 className="text-5xl md:text-7xl leading-tight mb-6 text-[#0B2545]" style={{ fontFamily: "'Playfair Display', serif" }}>Engineered<br />Gourmet Gifting</h1>
                  <p className="text-lg md:text-xl max-w-lg mb-8 leading-relaxed text-gray-700 font-light border-l-2 pl-4 border-[#B87333]">
                    We translate your requirement into a well-spec'd solution — exclusive, memorable and built to perform when it's unboxed.
                  </p>
                  <div className="flex flex-wrap gap-4 font-mono-tech">
                    <a href="#hampers" className="inline-flex items-center px-8 py-4 text-xs tracking-widest uppercase font-bold text-white transition-all hover:bg-opacity-90 shadow-[4px_4px_0px_#B87333] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_#B87333]" style={{ backgroundColor: colors.navy }}>
                      EXECUTE_BUY <i data-lucide="chevron-right" className="ml-2 w-4 h-4"></i>
                    </a>
                    <a href="#addons" className="inline-flex items-center px-8 py-4 text-xs tracking-widest uppercase font-bold text-[#0B2545] border-2 border-[#0B2545] transition-all hover:bg-[#0B2545] hover:text-white" style={{ backgroundColor: 'transparent' }}>
                      INITIATE_CONFIG <i data-lucide="settings" className="ml-2 w-4 h-4"></i>
                    </a>
                  </div>
                </div>
                <div className="md:w-1/2 relative z-10 flex justify-center md:justify-end">
                  <div className="relative w-full max-w-md drafting-marks">
                    <div className="absolute -inset-4 border border-[#B87333]/30 z-0 border-dashed"></div>
                    <div className="absolute inset-0 translate-x-4 translate-y-4 shadow-xl bg-[#C8A042]"></div>
                    <img src="https://images.unsplash.com/photo-1549465220-1a8b9238cd48?q=80&w=2040&auto=format&fit=crop" alt="Premium Gift Hamper" className="relative w-full h-auto object-cover shadow-2xl border border-[#0B2545]" />
                    <div className="absolute bottom-4 right-4 bg-white/90 backdrop-blur px-3 py-1 font-mono-tech text-[10px] text-[#0B2545] shadow-sm flex items-center">
                      <span className="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></span> SYSTEM.ONLINE
                    </div>
                  </div>
                </div>
              </section>

              {/* BRAND STORY */}
              <section id="about" className="py-24 px-6 md:px-12 lg:px-24 bg-white relative">
                <div className="absolute top-0 right-12 text-[#B87333]/20 font-mono-tech text-[200px] leading-none select-none font-bold">01</div>
                <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-16 relative z-10">
                  <div className="lg:w-[65%]">
                    <p className="font-mono-tech text-xs text-[#B87333] mb-2">// SECTION_01 : BRAND_ARCHITECTURE</p>
                    <h2 className="text-4xl text-[#0B2545]" style={{ fontFamily: "'Playfair Display', serif" }}>The Engineering Workflow</h2>
                    <Divider />
                    <div className="space-y-6 text-gray-700 leading-relaxed text-lg">
                      <p>At The Roasted Engineer, gifting isn't random — it's <strong className="text-[#0B2545] font-mono-tech text-sm bg-blue-50 px-1 rounded">ENGINEERED</strong>. We design every hamper like a well-built system: clear inputs, precise assembly, and a refined output — <strong className="text-[#B87333]">delight</strong>.</p>
                      <p>Our process follows an engineering workflow: sourcing high-grade ingredients (quality inputs), calibrating flavours and proportions (tolerance & balance), and finishing with robust, minimal packaging (reliable enclosure).</p>
                    </div>
                    <h3 className="text-2xl mt-12 mb-6 text-[#0B2545]" style={{ fontFamily: "'Playfair Display', serif" }}>What Makes Us Different</h3>
                    <ul className="space-y-4 font-medium">
                      {[
                        "Quality & Freshness with complete FSSAI labeling", 
                        "Minimal, client-first branding (Clean UI)", 
                        "Engineering-level precision (Balanced Bill-of-Materials)", 
                        "Fully customizable modular configurations", 
                        "Reliable SLA timelines (7–10 days dispatch)"
                      ].map((item, idx) => (
                        <li key={idx} className="flex items-start">
                          <span className="font-mono-tech text-[#B87333] mr-3 mt-1 text-xs">[{idx+1}]</span>
                          <span>{item}</span>
                        </li>
                      ))}
                    </ul>
                  </div>

                  <div className="lg:w-[35%]">
                     <div className="h-full bg-[#F5F1E8] p-8 border border-[#B87333]/20 relative drafting-marks">
                        <p className="font-mono-tech text-[10px] text-[#B87333] absolute top-2 right-3">PROCESS_FLOW.MAP</p>
                        <h3 className="text-2xl mb-8 text-[#0B2545]" style={{ fontFamily: "'Playfair Display', serif" }}>Execution Protocol</h3>
                        <div className="space-y-8">
                          <div className="flex items-center group">
                            <div className="w-12 h-12 flex items-center justify-center text-white mr-4 shadow-md bg-[#0B2545] font-mono-tech text-xs transition-transform group-hover:scale-110 relative">
                               <span className="absolute -top-1 -right-1 w-2 h-2 bg-[#B87333] rounded-full"></span> 01
                            </div>
                            <div><h4 className="font-bold text-sm tracking-widest uppercase text-[#0B2545] font-mono-tech">Phase_01: Base Model</h4><p className="text-sm text-gray-600">Select signature frame</p></div>
                          </div>
                          <div className="w-0.5 h-6 bg-[#B87333]/30 ml-6 -my-4"></div>
                          <div className="flex items-center group">
                            <div className="w-12 h-12 flex items-center justify-center text-white mr-4 shadow-md bg-[#B87333] font-mono-tech text-xs transition-transform group-hover:scale-110">02</div>
                            <div><h4 className="font-bold text-sm tracking-widest uppercase text-[#0B2545] font-mono-tech">Phase_02: Modules</h4><p className="text-sm text-gray-600">Configure payload</p></div>
                          </div>
                          <div className="w-0.5 h-6 bg-[#B87333]/30 ml-6 -my-4"></div>
                          <div className="flex items-center group">
                            <div className="w-12 h-12 flex items-center justify-center text-white mr-4 shadow-md bg-[#C8A042] font-mono-tech text-xs transition-transform group-hover:scale-110">03</div>
                            <div><h4 className="font-bold text-sm tracking-widest uppercase text-[#0B2545] font-mono-tech">Phase_03: Branding</h4><p className="text-sm text-gray-600">Apply UI / Sign-off</p></div>
                          </div>
                          <div className="w-0.5 h-6 bg-[#B87333]/30 ml-6 -my-4"></div>
                          <div className="flex items-center group">
                            <div className="w-12 h-12 flex items-center justify-center text-white mr-4 shadow-md bg-[#1A1A1A] font-mono-tech text-xs transition-transform group-hover:scale-110">04</div>
                            <div><h4 className="font-bold text-sm tracking-widest uppercase text-[#0B2545] font-mono-tech">Phase_04: Deployment</h4><p className="text-sm text-gray-600">SLA dispatch</p></div>
                          </div>
                        </div>
                     </div>
                  </div>
                </div>
              </section>

              {/* SIGNATURE HAMPERS */}
              <section id="hampers" className="py-24 px-6 md:px-12 lg:px-24 bg-[#F5F1E8] border-y border-[#B87333]/20">
                <div className="max-w-7xl mx-auto">
                  <div className="text-center mb-16 relative">
                    <p className="font-mono-tech text-xs text-[#B87333] mb-2 uppercase tracking-widest">// Pre-Configured_Builds</p>
                    <h2 className="text-4xl md:text-5xl mb-4 text-[#0B2545]" style={{ fontFamily: "'Playfair Display', serif" }}>Signature Assemblies</h2>
                    <div className="h-1 w-24 mx-auto bg-[#B87333]"></div>
                    <p className="mt-6 text-lg text-gray-600 font-light">Pre-configured blueprints for precise impact and premium output.</p>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-8 lg:gap-12">
                    {signatureHampers.map((hamper) => (
                      <div key={hamper.id} className={`bg-white relative overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 flex flex-col group ${hamper.badge ? 'border-2' : 'border border-[#B87333]/20 drafting-marks'}`} style={{ borderColor: hamper.badge ? colors.copper : '' }}>
                        {hamper.badge && (
                          <div className="w-full text-center text-[10px] font-bold py-1.5 text-white uppercase tracking-widest font-mono-tech bg-[#B87333]">
                            [ {hamper.badge} ]
                          </div>
                        )}
                        <div className="absolute top-2 left-2 z-20 font-mono-tech text-[9px] text-white/80 mix-blend-difference">
                          SKU: {hamper.sku}
                        </div>

                            </div>
                            <div>
                              <label className="block text-[10px] text-gray-500 mb-1 flex items-center tracking-widest uppercase"><i data-lucide="palette" className="w-3 h-3 mr-1"></i> Color_Profile</label>
                              <select value={customBoxTheme} onChange={(e) => setCustomBoxTheme(e.target.value)} className="w-full px-3 py-2 border border-gray-200 text-xs focus:outline-none focus:border-[#0B2545] bg-gray-50">
                                <option value="Navy/Copper">Navy base / Copper accents</option>
                                <option value="Cream/Gold">Cream base / Gold accents</option>
                                <option value="Luxe Navy-Gold">Luxe Navy base / Gold Foil</option>
                                <option value="Standard Custom">Manual Spec (Specify via WA)</option>
                              </select>
                            </div>
                            <div>
                              <label className="block text-[10px] text-gray-500 mb-1 tracking-widest uppercase flex items-center"><i data-lucide="upload" className="w-3 h-3 mr-1"></i> Vector_Asset</label>
                              <label className="flex items-center justify-center w-full px-4 py-2 bg-gray-50 border border-gray-200 border-dashed cursor-pointer hover:bg-gray-100 transition-colors">
                                <span className="text-xs text-gray-500 truncate max-w-[200px]">{customLogoInfo ? customLogoInfo.name : '[ UPLOAD LOGO FILE ]'}</span>
                                <input type="file" accept="image/*,.pdf,.ai,.eps" className="hidden" onChange={(e) => { if (e.target.files && e.target.files[0]) { setCustomLogoInfo(e.target.files[0]); } }} />
                              </label>
                            </div>
                          </div>
                        </div>
                      ) : (
                        <div className="mb-4 bg-orange-50/50 p-4 border border-orange-200 text-center font-mono-tech">
                          <p className="text-[10px] text-orange-800 flex flex-col items-center justify-center tracking-wider uppercase">
                             <span className="font-bold mb-1 flex items-center">[ UPGRADE_AVAILABLE ]</span>
                             Require QTY &ge; 50 to unlock UI branding features.
                          </p>
                        </div>
                      )}
                    </div>

                    <div className="p-0 border-t border-[#0B2545] flex">
                      <button onClick={sendWhatsAppOrder} className="w-full py-4 text-[#0B2545] font-bold tracking-widest uppercase text-xs flex justify-center items-center transition-all bg-[#25D366] hover:bg-[#1DA851] font-mono-tech">
                        EXECUTE_TRANSMISSION <i data-lucide="message-circle" className="w-4 h-4 ml-2"></i>
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
